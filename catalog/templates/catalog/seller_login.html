{% extends 'base.html' %}
{% load static %}

{% block title %}Вход продавца — Market Parts{% endblock %}

{% block content %}
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="/">
      <img src="{% static 'images/logo.jpg' %}" alt="Market Parts">
      <div class="brand-title">Market <span>Parts</span></div>
    </a>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="seller-page-card">
      <h2>Вход продавца</h2>

      {% if error_message %}
        <div class="form-error">{{ error_message }}</div>
      {% endif %}

      <form method="post" class="seller-form">
        {% csrf_token %}

        <p>
          <label for="username">Логин</label>
          <input type="text" id="username" name="username" required>
        </p>

        <p>
          <label for="password">
            Пароль
          </label>

          <input
            type="password"
            id="password"
            name="password"
            required
          >

          <label
            style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:14px;"
          >
            <input
              type="checkbox"
              onclick="togglePasswordLogin()"
            >

            Показать пароль
          </label>
        </p>

        <button type="submit" class="btn red">Войти</button>
      </form>

      <p class="form-note">
        Нет аккаунта?
        <a href="{% url 'seller_register' %}">Зарегистрироваться</a>
      </p>
    </div>
  </div>
</section>
<script>
function togglePasswordLogin() {

  const input = document.getElementById("password");

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }

}
</script>
{% endblock %}
