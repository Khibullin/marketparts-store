{% extends 'base.html' %}
{% load static %}

{% block title %}Редактировать профиль — Market Parts{% endblock %}

{% block content %}
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="/">
      <img src="{% static 'images/logo.jpg' %}" alt="Market Parts">
      <div class="brand-title">Market <span>Parts</span></div>
    </a>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="seller-page-card">
      <h2>Редактировать профиль</h2>
      <p class="dashboard-subtitle">Обновите информацию о вашем магазине</p>

      <form method="post" class="seller-form">
        {% csrf_token %}

        <p>
          <label for="{{ form.name.id_for_label }}">{{ form.name.label }}</label>
          {{ form.name }}
        </p>

        <p>
          <label for="{{ form.phone.id_for_label }}">{{ form.phone.label }}</label>
          {{ form.phone }}
        </p>

        <p>
          <label for="{{ form.city.id_for_label }}">{{ form.city.label }}</label>
          {{ form.city }}
        </p>

        <div class="form-action-row">
          <button type="submit" class="btn red">Сохранить</button>
          <a href="{% url 'seller_profile' %}" class="btn outline">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
