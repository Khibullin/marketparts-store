{% extends 'base.html' %}

{% block content %}

<div class="search-box">
    <form method="get" action="/catalog/">

        <input type="text" name="q" placeholder="Например: Тормозные колодки на Camry 2015">

        <select name="country">
            <option value="">Выберите страну</option>
            {% for c in countries %}
            <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
        </select>

        <select name="brand">
            <option value="">Выберите марку</option>
        </select>

        <select name="model">
            <option value="">Выберите модель</option>
        </select>

        <button type="submit" class="btn-login">Найти</button>
    </form>
</div>

<h3>Популярные категории</h3>

<a href="/catalog/?category=1" class="category-btn">Двигатель</a>
<a href="/catalog/?category=2" class="category-btn">Ходовая</a>
<a href="/catalog/?category=3" class="category-btn">Кузов</a>
<a href="/catalog/?category=4" class="category-btn">Электрика</a>

<h3>Популярные марки</h3>

<a href="/catalog/?brand=1" class="category-btn">Toyota</a>
<a href="/catalog/?brand=2" class="category-btn">BMW</a>
<a href="/catalog/?brand=3" class="category-btn">Hyundai</a>
<a href="/catalog/?brand=4" class="category-btn">Kia</a>

{% endblock %}
